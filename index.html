    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #f8faf9; --bg-mid: #ffffff; --bg-light: #f0f4f2;
            --accent-gold: #c5a059; --accent-hover: #b38f4d;
            --text-main: #2c3e50; --text-muted: #7f8c8d;
            --glass-bg: rgba(0, 0, 0, 0.04); --glass-border: rgba(0, 0, 0, 0.05);
            --glass-active: rgba(197, 160, 89, 0.08);
            --player-bg: rgba(255, 255, 255, 0.98);
            --shadow-intensity: rgba(0, 0, 0, 0.05);
        }

        body.dark-theme {
            --bg-dark: #121212; --bg-mid: #1c1c1c; --bg-light: #252525;
            --text-main: #ffffff; --text-muted: #9a9a9a;
            --glass-bg: rgba(255, 255, 255, 0.06); --glass-border: rgba(255, 255, 255, 0.08);
            --glass-active: rgba(197, 160, 89, 0.12);
            --player-bg: rgba(26, 26, 26, 0.98);
            --shadow-intensity: rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding-bottom: 140px; user-select: none; }

        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 16px; }

        /* شريط التثبيت والتوست */
        .install-banner { position: fixed; top: 0; left: 50%; transform: translateX(-50%) translateY(-100%); width: 100%; max-width: 480px; background: var(--player-bg); backdrop-filter: blur(15px); border-bottom: 2px solid var(--accent-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 10001; display: flex; align-items: center; padding: 12px 16px; gap: 12px; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .install-banner.show { transform: translateX(-50%) translateY(0); }
        .install-icon { width: 42px; height: 42px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .install-info { flex: 1; display: flex; flex-direction: column; }
        .install-title { font-size: 0.85rem; font-weight: 700; color: var(--text-main); }
        .install-desc { font-size: 0.65rem; color: var(--text-muted); line-height: 1.3; margin-top: 2px; }
        .install-action-btn { background: var(--accent-gold); color: #fff; border: none; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 0.75rem; cursor: pointer; box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3); white-space: nowrap; }
        .install-close-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 50%; }
        .install-close-btn svg { width: 18px; height: 18px; }

        #resume-banner { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150px); background: var(--player-bg); border: 1px solid var(--accent-gold); padding: 12px 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 10000; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; visibility: hidden; backdrop-filter: blur(10px); }
        #resume-banner.show { transform: translateX(-50%) translateY(0); opacity: 1; visibility: visible; }
        .resume-text { font-size: 0.85rem; font-weight: 700; color: var(--text-main); text-align: center; }
        .resume-actions { display: flex; gap: 10px; justify-content: center; }
        .resume-btn { background: var(--accent-gold); color: #fff; border: none; padding: 6px 20px; border-radius: 10px; font-weight: 700; font-size: 0.8rem; cursor: pointer; box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3); }
        .resume-close { background: var(--glass-bg); color: var(--text-muted); border: 1px solid var(--glass-border); padding: 6px 20px; border-radius: 10px; font-weight: 700; font-size: 0.8rem; cursor: pointer; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .top-bar-group { display: flex; gap: 8px; align-items: center; }
        .top-btn { background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 700; font-size: 0.75rem; text-decoration: none; position: relative; }
        .top-btn svg { width: 18px; height: 18px; }

        header { text-align: center; padding-bottom: 20px; transition: 0.3s; }
        .header-img { height: 115px; width: 115px; border-radius: 50%; border: 3px solid var(--accent-gold); box-shadow: 0 8px 25px var(--shadow-intensity); object-fit: cover; margin-bottom: 15px; transition: transform 0.3s ease; }
        .header-img:hover { transform: scale(1.05); }
        header h1 { font-size: 1.15rem; font-weight: 300; margin-top: 5px; } 
        header h1 strong { font-weight: 700; color: var(--accent-gold); }
        header p { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

        .header-equalizer { display: flex; align-items: flex-end; justify-content: center; gap: 4px; height: 18px; margin-top: 12px; opacity: 0; visibility: hidden; }
        .header-equalizer.playing { opacity: 1; visibility: visible; }
        .header-eq-bar { width: 3px; height: 100%; background: var(--accent-gold); border-radius: 3px; transform-origin: bottom; box-shadow: 0 0 8px rgba(197, 160, 89, 0.4); }
        @keyframes equalize { 0% { transform: scaleY(0.3); } 100% { transform: scaleY(1); } }
        .header-equalizer.playing .header-eq-bar:nth-child(1) { animation: equalize 0.7s infinite alternate ease-in-out; }
        .header-equalizer.playing .header-eq-bar:nth-child(2) { animation: equalize 0.5s infinite alternate ease-in-out 0.2s; }
        .header-equalizer.playing .header-eq-bar:nth-child(3) { animation: equalize 0.8s infinite alternate ease-in-out 0.1s; }
        .header-equalizer.playing .header-eq-bar:nth-child(4) { animation: equalize 0.6s infinite alternate ease-in-out 0.3s; }
        .header-equalizer.playing .header-eq-bar:nth-child(5) { animation: equalize 0.7s infinite alternate ease-in-out 0.15s; }

        .sheikh-selector-wrapper { display: none !important; }

        .edition-dropdown-wrapper { position: relative; margin: 0px 5px 25px 5px; z-index: 10; }
        .edition-list-wrapper { width: 100%; }
        .edition-list { display: flex; gap: 8px; overflow-x: auto; padding: 2px 5px 5px 5px; scrollbar-width: none; }
        .edition-list::-webkit-scrollbar { display: none; }
        .edition-dropdown-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow-intensity);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }
        .edition-dropdown-btn:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 6px 15px rgba(197, 160, 89, 0.2);
        }
        .edition-dropdown-btn.active {
            background: var(--glass-active);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        .edition-dropdown-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }
        .edition-dropdown-btn.open svg {
            transform: rotate(180deg);
        }
        
        .edition-dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            left: 0;
            background: var(--bg-mid);
            border: 1px solid var(--glass-border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            box-shadow: 0 8px 20px var(--shadow-intensity);
            z-index: 100;
        }
        .edition-dropdown-menu.show {
            max-height: 400px;
            opacity: 1;
            pointer-events: auto;
            overflow-y: auto;
        }
        .edition-dropdown-menu::-webkit-scrollbar {
            width: 6px;
        }
        .edition-dropdown-menu::-webkit-scrollbar-track {
            background: transparent;
        }
        .edition-dropdown-menu::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 3px;
        }
        .edition-dropdown-menu::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        .edition-menu-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.85rem;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .edition-menu-item:hover {
            background: var(--glass-active);
            color: var(--accent-gold);
        }
        .edition-menu-item.active {
            background: var(--glass-active);
            color: var(--accent-gold);
            font-weight: 700;
        }
        .edition-menu-item.active::before {
            content: '✓';
            color: var(--accent-gold);
            font-weight: 700;
            margin-left: 8px;
        }
        @keyframes flash-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.4); } }
        .active-dot { display: inline-block; width: 6px; height: 6px; background: var(--accent-gold); border-radius: 50%; animation: flash-dot 1.5s infinite ease-in-out; flex-shrink: 0; }

        .surah-list-container { display: flex; flex-direction: column; gap: 6px; }
        .surah-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg-mid); border: 1px solid var(--glass-border); border-radius: 12px; transition: 0.15s; }
        .surah-row.active-row { border-color: var(--accent-gold); background: var(--glass-active); }
        .surah-info { display: flex; align-items: center; gap: 12px; }
        .surah-number { font-size: 0.75rem; color: var(--accent-gold); font-weight: 700; min-width: 24px; }
        .surah-name { font-size: 0.8rem; font-weight: 700; color: var(--text-main); }
        .surah-actions { display: flex; align-items: center; gap: 8px; }
        .surah-action-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--bg-light); border: 1px solid var(--glass-border); color: var(--text-muted); cursor: pointer; }
        .surah-action-btn svg { width: 14px !important; height: 14px !important; }
        .active-row .play-cell { background: var(--accent-gold); color: #fff; border-color: var(--accent-gold); box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3); }

        .icon-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
        .floating-player .icon-btn { color: #c5a059; }
        .floating-player .icon-btn:hover { color: #fff; }
        .icon-btn.active-feature { color: var(--accent-gold) !important; }

        .download-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .download-modal-content { background: var(--bg-mid); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; width: 85%; max-width: 320px; text-align: center; }
        .dl-modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 15px; color: var(--text-main); }
        .dl-progress-track { width: 100%; height: 8px; background: var(--glass-border); border-radius: 10px; overflow: hidden; position: relative; }
        .dl-progress-fill { height: 100%; width: 0%; background: var(--accent-gold); border-radius: 10px; }
        .dl-modal-pct { margin-top: 12px; font-size: 0.9rem; font-weight: 700; color: var(--accent-gold); }

        .floating-player { 
            position: fixed; 
            bottom: 12px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 92%; 
            max-width: 440px; 
            background: #2c3e50;
            backdrop-filter: blur(20px); 
            border-radius: 16px; 
            border: 2px solid #c5a059;
            padding: 10px 15px; 
            box-shadow: 0 12px 35px rgba(197, 160, 89, 0.4);
            display: none; 
            z-index: 1000;
            color: #fff;
        }
        body.dark-theme .floating-player {
            background: #1a1a1a;
            border-color: #c5a059;
            box-shadow: 0 12px 35px rgba(197, 160, 89, 0.3);
        }
        .player-seekbar-container { width: 100%; height: 12px; display: flex; align-items: center; cursor: pointer; direction: ltr; margin-bottom: 2px; touch-action: none; }
        .player-seekbar-track { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 10px; position: relative; }
        .player-seekbar-fill { height: 100%; background: #c5a059; width: 0%; border-radius: 10px; pointer-events: none; }
        .player-seekbar-thumb { position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: #fff; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3); }
        .play-toggle-btn { background: #c5a059; color: #fff; border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(197, 160, 89, 0.4); font-weight: 700; transition: all 0.3s ease; }
        .play-toggle-btn:hover { background: #b38f4d; box-shadow: 0 6px 15px rgba(197, 160, 89, 0.5); }
        body.dark-theme .play-toggle-btn { background: #c5a059; }
        .play-toggle-btn svg { width: 16px !important; height: 16px !important; }
        .icon-btn svg { width: 20px; height: 20px; }

        .playback-menu { position: absolute; bottom: 100%; right: 0; margin-bottom: 10px; width: 120px; background: var(--bg-mid); border: 1px solid var(--glass-border); border-radius: 10px; box-shadow: 0 -5px 20px rgba(0,0,0,0.15); overflow: hidden; max-height: 0; opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; transform: translateY(10px); z-index: 1010; }
        .playback-menu.show { max-height: 200px; opacity: 1; pointer-events: auto; transform: translateY(0); }
        .playback-menu-item { padding: 8px 12px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); cursor: pointer; text-align: right; border-bottom: 1px solid var(--glass-border); }
        .playback-menu-item.active { background: var(--glass-active); color: var(--accent-gold); }

        .toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text-main); color: var(--bg-mid); padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 10000; text-align: center; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-spin { animation: spin 1s linear infinite; display: block; }

        /* =======================================================
           التصميم الجديد لوضع الاستماع الهادئ (النص القرآني)
        ======================================================== */

        .quran-text-container {
            display: none; /* مخفي في الوضع العادي */
            width: 100%;
            text-align: center;
            padding: 10px 0;
        }

        .quran-text-content {
            font-family: 'Amiri', 'Cairo', serif; /* خط عثماني مريح للقراءة */
            font-size: 1.6rem; /* حجم كبير للآيات */
            line-height: 2.4;
            color: var(--text-main);
            padding-bottom: 80px; /* مسافة من الأسفل حتى لا يغطي المشغل على الآيات */
        }

        .verse-end {
            display: inline-block;
            margin: 0 6px;
            font-size: 1.1rem;
            color: var(--accent-gold);
        }

        /* التغييرات عند تفعيل الوضع الهادئ */
        body.focus-mode-active #main-header,
        body.focus-mode-active .edition-dropdown-wrapper,
        body.focus-mode-active .surah-list-container,
        body.focus-mode-active .top-bar-group,
        body.focus-mode-active .install-banner,
        body.focus-mode-active button[onclick="toggleLanguage()"] {
            display: none !important;
        }

        body.focus-mode-active .quran-text-container {
            display: block !important;
            opacity: 1 !important;
            visibility: visible !important;
            min-height: 100vh;
        }

        body.focus-mode-active {
            display: block !important;
            overflow-y: auto !important;
            height: auto !important;
        }

        /* =======================================================
           تنسيقات مزامنة الآيات (التظليل الذكي)
        ======================================================== */
        .quran-verse {
            transition: color 0.4s ease, background-color 0.4s ease;
            padding: 2px 6px;
            border-radius: 8px;
            display: inline;
            cursor: pointer;
            position: relative;
        }
        
        .quran-verse:hover {
            background-color: var(--glass-active);
        }

        .quran-verse.active-verse {
            color: var(--accent-gold);
            background-color: var(--glass-active);
            font-weight: 700;
            transition: none !important;
        }
    </style>
</head>
<body>

    <div id="install-banner" class="install-banner">
        <img src="icon.png" alt="App Icon" class="install-icon">
        <div class="install-info">
            <div class="install-title" id="install-title">تثبيت تطبيق Egy Quran</div>
            <div class="install-desc" id="install-desc">تجربة استماع أسرع وتعمل بدون إنترنت</div>
        </div>
        <button class="install-action-btn" id="install-action-btn">تثبيت</button>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <div id="resume-banner">
        <div class="resume-text" id="resume-text">هل تود إكمال الاستماع؟</div>
        <div class="resume-actions">
            <button class="resume-btn" id="resume-btn-yes" onclick="resumePlayback()">متابعة الاستماع</button>
            <button class="resume-close" id="resume-btn-no" onclick="closeResumeBanner()">إلغاء</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <div class="container">
        <div class="top-bar">
            <div class="top-bar-group">
                <button class="top-btn" onclick="toggleTheme()" id="theme-toggle-btn"></button>
                <a href="mailto:your-email@example.com" class="top-btn email-btn" title="تواصل معنا">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </a>
            </div>
            <button class="top-btn" onclick="toggleLanguage()"><span id="lang-label">EN</span></button>
        </div>

        <header id="main-header">
            <img src="" id="header-avatar-img" class="header-img">
            <h1 id="main-title"></h1>
            <p id="header-subtitle"></p>
            
            <div id="header-equalizer" class="header-equalizer">
                <div class="header-eq-bar"></div>
                <div class="header-eq-bar"></div>
                <div class="header-eq-bar"></div>
                <div class="header-eq-bar"></div>
                <div class="header-eq-bar"></div>
            </div>
        </header>

        <div id="quran-text-container" class="quran-text-container">
            <div id="quran-text-content" class="quran-text-content"></div>

                21: { pillAr: "الأزرق عن نافع", pillEn: "Al-Azraq A'n Nafi'", file: "maasarawi_21.json", descAr: "الأزرق عن نافع", descEn: "Al-Azraq A'n Nafi'" }
            } 
        };

        const icons = {
            play: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
            pause: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>',
            loading: '<svg class="loading-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"></path></svg>',
            sun: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>',
            moon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>',
            download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>'
        };

        let audioInstance = new Audio(); audioInstance.crossOrigin = "anonymous"; 
        let audioCtx, gainNode, audioSource;

        let surahTimings = {}; 
        let currentActiveVerse = null; 

        function initAudioBoost() {
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) {
                        audioCtx = new AudioContext(); audioSource = audioCtx.createMediaElementSource(audioInstance);
                        gainNode = audioCtx.createGain(); gainNode.gain.value = 3.5;
                        audioSource.connect(gainNode); gainNode.connect(audioCtx.destination);
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(e => console.log(e));
            } catch (e) { console.log("Audio API Init Error:", e); }
        }

        let currentTheme = 'light', currentSheikhId = "maasarawi", currentEdition = null;
        let activeSurahsData = [], playingSurahId = null, playingSheikhId = null, playingEditionId = null, isBuffering = false;
        let isFocusMode = false;
        let activeDownloads = {}; let savedReciterEditions = {}; let playbackMode = 'autonext'; let playbackMenuOpen = false;

        let isUserScrolling = false;
        let userInteractionTimeout;
        let targetScroll = 0;
        let currentScroll = 0;
        let scrollRafId = null;

        function resetUserInteraction() {
            isUserScrolling = true;
            clearTimeout(userInteractionTimeout);
            userInteractionTimeout = setTimeout(() => { 
                isUserScrolling = false; 
                if (isFocusMode) currentScroll = window.scrollY; 
            }, 3500); 
        }

        window.addEventListener('touchstart', resetUserInteraction, {passive: true});
        window.addEventListener('touchmove', resetUserInteraction, {passive: true});
        window.addEventListener('wheel', resetUserInteraction, {passive: true});
        window.addEventListener('mousedown', resetUserInteraction, {passive: true});

        function updateScrollLoop() {
            if (isFocusMode) {
                if (!isUserScrolling) {
                    currentScroll += (targetScroll - currentScroll) * 0.08; // زيادة السرعة لتكون سلسة وملحوظة أكثر 
                    if (Math.abs(targetScroll - currentScroll) > 0.5) {
                        window.scrollTo(0, currentScroll);
                    }
                } else {
                    currentScroll = window.scrollY;
                }
                scrollRafId = requestAnimationFrame(updateScrollLoop);
            }
        }

        const quranTextCache = {};

        async function loadSurahText(surahId) {
            const container = document.getElementById('quran-text-content');
            
            if (quranTextCache[surahId]) {
                container.innerHTML = quranTextCache[surahId];
                if(isFocusMode) {
                    window.scrollTo({ top: 0, behavior: 'auto' });
                    currentScroll = 0; targetScroll = 0;
                }
                return;
            }

            container.innerHTML = `
                <div style="height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; color: var(--accent-gold);">
                    ${icons.loading}
                    <span style="font-family: 'Cairo', sans-serif; font-size: 1.1rem; color: var(--text-muted); font-weight: 600;">
                        ${currentLang === 'ar' ? 'جاري جلب الآيات...' : 'Loading Verses...'}
                    </span>
                </div>`;
            
            try {
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${surahId}`);
                const data = await response.json();
                
                let textHTML = ''; 
                
                data.data.ayahs.forEach(ayah => {
                    let ayahText = ayah.text;
                    let introHTML = '';
                    
                    if (surahId !== 1 && surahId !== 9 && ayah.numberInSurah === 1) {
                        let words = ayahText.trim().split(/\s+/);
                        
                        if (words.length > 4) {
                            let basmalaText = words.slice(0, 4).join(' '); 
                            let remainingText = words.slice(4).join(' ');  
                            
                            introHTML = `<div class="api-intro-line" style="display: block; width: 100%; text-align: center; margin-bottom: 20px; font-size: 1.2em; color: var(--accent-gold); font-weight: bold;">${basmalaText}</div>`;
                            ayahText = remainingText;
                        } else if (words.length === 4) {
                            introHTML = `<div class="api-intro-line" style="display: block; width: 100%; text-align: center; margin-bottom: 20px; font-size: 1.2em; color: var(--accent-gold); font-weight: bold;">${ayahText}</div>`;
                            ayahText = ''; 
                        }
                    }

                    if (ayahText.trim() !== '') {
                        textHTML += `${introHTML}<span id="verse-${surahId}-${ayah.numberInSurah}" class="quran-verse" onclick="seekToVerse(${surahId}, ${ayah.numberInSurah})">${ayahText} <span class="verse-end">﴿${ayah.numberInSurah}﴾</span></span> `;
                    } else {
                        textHTML += `${introHTML}`;
                    }
                });

                quranTextCache[surahId] = textHTML;
                container.innerHTML = textHTML;
                if(isFocusMode) {
                    window.scrollTo({ top: 0, behavior: 'auto' });
                    currentScroll = 0; targetScroll = 0;
                }
            } catch (error) {
                container.innerHTML = '<div style="color: var(--text-muted); font-family: Cairo, sans-serif; margin-top: 50px; font-size: 1rem; text-align: center;">يرجى الاتصال بالإنترنت لعرض النص القرآني.</div>';
            }
        }

        async function loadSurahTimings(surahId) {
            if (surahTimings[surahId] !== undefined) return; 

            try {
                const response = await fetch(`timings_${surahId}.json`);
                if (response.ok) {
                    const data = await response.json();
                    surahTimings[surahId] = data; 
                } else {
                    surahTimings[surahId] = null; 
                }
            } catch (error) {
                surahTimings[surahId] = null;
            }
        }

        function seekToVerse(surahId, verseNumber) {
            if (playingSurahId !== surahId) return;
            
            const timings = surahTimings[surahId];
            if (timings) {
                const verseData = timings.find(v => v.id === verseNumber);
                if (verseData && verseData.start_time !== undefined) {
                    audioInstance.currentTime = verseData.start_time;
                    
                    // تحديث التظليل فوراً
                    const activeVerseId = `verse-${surahId}-${verseNumber}`;
                    if (currentActiveVerse && currentActiveVerse !== activeVerseId) {
                        const prevEl = document.getElementById(currentActiveVerse);
                        if (prevEl) prevEl.classList.remove('active-verse');
                    }
                    const currentEl = document.getElementById(activeVerseId);
                    if (currentEl) {
                        currentEl.classList.add('active-verse');
                        currentActiveVerse = activeVerseId;
                        
                        // التمرير الفوري للآية
                        currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                        // تحديث الهدف للتمرير التدريجي السلس في وضع التركيز
                        if (isFocusMode) {
                            const newTarget = currentEl.offsetTop - (window.innerHeight / 2) + (currentEl.offsetHeight / 2);
                            targetScroll = Math.max(0, newTarget);
                            // لا نحدث currentScroll هنا لترك المجال للتمرير السلس
                        }
                    }
                    
                    if (audioInstance.paused) {
                        togglePlayPause();
                    }
                    showToast(currentLang === 'ar' ? `الانتقال إلى الآية ${verseNumber}` : `Seeking to Verse ${verseNumber}`);
                }
            }
        }

        function getSurahName(id, nameAr) { return currentLang === 'ar' ? nameAr : surahNamesEn[id]; }

        function updateHeaderUI() {
            const s = recitersList.find(r => r.id === currentSheikhId);
            if (s) {
                document.getElementById('header-avatar-img').src = s.image;
                document.getElementById('main-title').innerHTML = `${translations[currentLang].sheikhPrefix} <strong>${currentLang === 'ar' ? s.nameAr : s.nameEn}</strong>`;
                const editionDesc = editionsConfig[currentSheikhId] && editionsConfig[currentSheikhId][currentEdition] ? (currentLang === 'ar' ? editionsConfig[currentSheikhId][currentEdition].descAr : editionsConfig[currentSheikhId][currentEdition].descEn) : "";
                document.getElementById('header-subtitle').innerText = editionDesc;
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr'; document.documentElement.lang = currentLang;
            document.documentElement.style.setProperty('--dir', document.documentElement.dir);
            document.getElementById('lang-label').innerText = translations[currentLang].langLabel;
            document.getElementById('resume-btn-yes').innerText = translations[currentLang].resumeBtn; document.getElementById('resume-btn-no').innerText = translations[currentLang].cancelBtn;
            document.getElementById('install-title').innerText = translations[currentLang].installTitle; document.getElementById('install-desc').innerText = translations[currentLang].installDesc; document.getElementById('install-action-btn').innerText = translations[currentLang].installBtn;
            updateHeaderUI(); setPlaybackMode(playbackMode);
            if (playingSurahId) { const sData = activeSurahsData.find(s => s.id === playingSurahId); if(sData) document.getElementById('player-track-title').innerText = `${translations[currentLang].surahPrefix} ${getSurahName(sData.id, sData.name)}`; }
            renderEditionDropdown(); if (activeSurahsData && activeSurahsData.length > 0) renderSurahsList();
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.className = currentTheme === 'dark' ? 'dark-theme' : '';
            document.getElementById('theme-toggle-btn').innerHTML = currentTheme === 'dark' ? icons.moon : icons.sun;
        }

        function toggleFocusMode(forceState) {
            let newState;
            if (typeof forceState === 'boolean') {
                newState = forceState;
            } else {
                newState = !isFocusMode;
            }

            if (isFocusMode === newState) return; 
            
            isFocusMode = newState;
            
            const focusBtn = document.getElementById('focus-toggle-btn');
            
            if (isFocusMode) {
                document.body.classList.add('focus-mode-active');
                if (focusBtn) focusBtn.classList.add('active-feature');

            } else { 
                localStorage.removeItem('lastPlayedQuran'); 
            }
            
            // تهيئة القائمة المنسدلة بدون اختيار
            renderEditionDropdown();
            renderSurahsList();
            updateHeaderUI();

            if(savedState && savedState.surah && savedState.sheikh === 'maasarawi') {
                // إذا كان هناك حالة محفوظة، اختر الرواية المحفوظة تلقائياً
                currentEdition = savedState.edition || 1;
                await loadEditionData('maasarawi', currentEdition);
                const sData = activeSurahsData.find(s => s.id === savedState.surah);
                if(sData && audioInstance.src === "") {
                    const sName = getSurahName(sData.id, sData.name);
                    const promptText = currentLang === 'ar' ? `هل تود إكمال الاستماع إلى سورة ${sName}؟` : `Resume listening to Surah ${sName}?`;
                    document.getElementById('resume-text').innerText = promptText; document.getElementById('resume-banner').classList.add('show');
                    window.resumeData = { id: sData.id, url: sData.url }; setTimeout(() => closeResumeBanner(), 15000);
                }
                renderEditionDropdown();
                renderSurahsList();
            }
        })();
    </script>
</body>
</html>
